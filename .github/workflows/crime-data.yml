name: Actualizar base de delitos

on:
  schedule:
    # Una vez por mes (el dataset oficial se actualiza esporádicamente).
    - cron: "17 5 1 * *"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: crime-data
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Construir base de delitos
        run: python scripts/build_crime.py

      - name: Commitear datos
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/crime.json
          [ -f data/comunas.geojson ] && git add data/comunas.geojson || true
          if git diff --staged --quiet; then
            echo "Sin cambios en la base de delitos"
          else
            git commit -m "chore: actualizar base de delitos por comuna [skip ci]"
            for i in 1 2 3; do git push && break; git pull --rebase; done
          fi

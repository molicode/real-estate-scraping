name: Deploy web a GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true

      # Cache-busting: cada deploy referencia app.js/styles.css con la versión
      # del commit, así el navegador SIEMPRE baja la última (nunca queda pegado
      # a un app.js viejo cacheado). Solo se toca la copia que se despliega.
      - name: Versionar assets (cache-busting)
        run: |
          ver="${GITHUB_SHA::8}"
          sed -i "s|src=\"app.js\"|src=\"app.js?v=$ver\"|; s|href=\"styles.css\"|href=\"styles.css?v=$ver\"|" web/index.html
          echo "Assets versionados con v=$ver"
          grep -E "app.js\?v=|styles.css\?v=" web/index.html || true

      - name: Subir sitio
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Desplegar
        id: deployment
        uses: actions/deploy-pages@v4

name: Scraper de propiedades

on:
  schedule:
    # Cada hora, todos los días (UTC). GitHub puede demorar el inicio
    # algunos minutos en horas pico.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Solo enviar un mensaje de prueba a Telegram (no scrapea)"
        required: false
        default: false
        type: boolean
      only_job:
        description: "Ejecutar solo este job (nombre exacto), aunque esté detenido"
        required: false
        default: ""

permissions:
  contents: write

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    # Con muchos jobs activos una corrida global recorre todos en secuencia y
    # puede tardar bastante (Zonaprop/ML reintentan por proxy). El cron horario,
    # si escalonás los jobs con 'desfase', corre de a pocos y termina rápido.
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Prueba de Telegram
        if: github.event_name == 'workflow_dispatch' && inputs.telegram_test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_test.py

      - name: Ejecutar scraper
        if: github.event_name != 'workflow_dispatch' || !inputs.telegram_test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          ONLY_JOB: ${{ inputs.only_job }}
        run: python -m scraper.main

      - name: Commitear resultados
        if: github.event_name != 'workflow_dispatch' || !inputs.telegram_test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos"
            exit 0
          fi
          git commit -m "chore: actualizar avisos scrapeados [skip ci]"
          # Push robusto ante carreras: si el remoto avanzó (otra corrida o un
          # merge), rebaseamos resolviendo los conflictos de datos a favor de lo
          # recién scrapeado (-X theirs durante el rebase). Nunca dejamos el
          # rebase a medias ni fallamos el job por una carrera de push: lo que
          # no llegue a entrar se vuelve a scrapear en la próxima corrida.
          pushed=0
          for i in 1 2 3 4 5; do
            if git push; then pushed=1; break; fi
            echo "push rechazado (intento $i): traigo el remoto y rebaseo"
            git fetch origin main || true
            git rebase -X theirs origin/main || git rebase --abort || true
            sleep $((i * 2))
          done
          if [ "$pushed" != 1 ]; then
            echo "::warning::No se pudo pushear los datos tras varios intentos; se reintenta en la próxima corrida"
          fi
          exit 0

name: Scraper de propiedades

on:
  schedule:
    # Cada hora, todos los días (UTC). GitHub puede demorar el inicio
    # algunos minutos en horas pico.
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      telegram_test:
        description: "Solo enviar un mensaje de prueba a Telegram (no scrapea)"
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: pip install -r requirements.txt

      - name: Prueba de Telegram
        if: github.event_name == 'workflow_dispatch' && inputs.telegram_test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python scripts/telegram_test.py

      - name: Ejecutar scraper
        if: github.event_name != 'workflow_dispatch' || !inputs.telegram_test
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
        run: python -m scraper.main

      - name: Commitear resultados
        if: github.event_name != 'workflow_dispatch' || !inputs.telegram_test
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --staged --quiet; then
            echo "Sin cambios en los datos"
          else
            git commit -m "chore: actualizar avisos scrapeados [skip ci]"
            # Reintenta el push por si otra corrida commiteó en el medio
            for i in 1 2 3; do
              git push && break
              git pull --rebase
            done
          fi

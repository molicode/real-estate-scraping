name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [feature/claude]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Configurar Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Instalar dependencias
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Validar jobs.json
        run: python -c "import json; json.load(open('jobs.json'))"

      - name: Correr tests
        run: python -m pytest tests/ -v
